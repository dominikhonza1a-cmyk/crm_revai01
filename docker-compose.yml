# Databáze i auth běží v Supabase (managed) → tady jen naše aplikace: web + worker.
# Oba procesy ze stejného image, připojené na Supabase přes .env (DATABASE_URL / DIRECT_URL / SUPABASE_*).
#
# Lokální vývoj bez cloudu: `npx supabase start` (Supabase CLI) spustí lokální Postgres+Auth v Dockeru
# a vypíše lokální connection stringy a klíče → vlož je do .env.
services:
  web:
    build: .
    command: npm run start
    env_file: .env
    ports:
      - "3000:3000"

  worker:
    build: .
    command: npm run worker
    env_file: .env

  # caddy:  # reverse proxy + TLS pro produkci na vaší doméně (crm.vasedomena.cz)
  #   image: caddy:2
